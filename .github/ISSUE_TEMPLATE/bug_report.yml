name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please do not include API keys, private prompts, customer data, or sensitive screenshots.
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g., macOS 15.6"
    validations:
      required: true
  - type: input
    id: hodor-version
    attributes:
      label: Hodor version
      placeholder: "e.g., 1.3.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open Hodor
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
