name: PromptPal
options:
  bundleIdPrefix: com.hodor
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

targets:
  PromptPal:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: HodorIcon.icon
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: HodorIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.hodor.design
        PRODUCT_NAME: Hodor
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "6"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Resources/PromptPal.entitlements
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
